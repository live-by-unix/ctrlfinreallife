<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL_OS_RECON</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #050505; --accent: #0080ff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); font-family: 'Courier New', monospace; overflow: hidden; color: var(--neon); }
        #v, #img-preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #img-preview { display: none; background: black; object-fit: contain; }
        #overlay { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .hud { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; pointer-events: none; padding: 20px; }
        .top-ui { pointer-events: auto; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { background: rgba(0,0,0,0.8); border: 2px solid var(--neon); color: var(--neon); padding: 15px; font-size: 22px; outline: none; box-shadow: 0 0 15px rgba(0,255,65,0.3); }
        .controls { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { background: rgba(0,0,0,0.7); border: 1px solid var(--neon); color: var(--neon); padding: 15px; border-radius: 5px; cursor: pointer; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; text-align: center; }
        .btn:active { background: var(--neon); color: black; }
        .btn.blue { border-color: var(--accent); color: var(--accent); }
        .telemetry-grid { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; font-size: 10px; gap: 5px; opacity: 0.8; background: rgba(0,0,0,0.5); padding: 10px; border-top: 1px solid var(--neon); }
        #scanner-bar { position: absolute; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 20px var(--neon); z-index: 4; top: 0; }
        .match-alert { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: var(--danger); text-shadow: 0 0 20px var(--danger); display: none; z-index: 10; border: 4px solid var(--danger); padding: 10px 30px; background: rgba(0,0,0,0.5); pointer-events: none; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline></video>
    <img id="img-preview" alt="preview">
    <canvas id="overlay"></canvas>
    <div id="scanner-bar"></div>
    <div id="alert" class="match-alert">TARGET LOCKED</div>

    <div class="hud">
        <div class="top-ui">
            <input type="text" id="q" placeholder="SEARCH IDENTIFIER..." spellcheck="false">
            <div id="status">INIT_CORE_LOAD...</div>
        </div>

        <div class="controls">
            <div class="btn" onclick="toggleTorch()">FLASHLIGHT</div>
            <div class="btn" onclick="adjustZoom(0.5)">ZOOM+</div>
            <div class="btn" onclick="adjustZoom(-0.5)">ZOOM-</div>
            <div class="btn blue" onclick="document.getElementById('file-input').click()">UPLOAD</div>
            <div class="btn blue" onclick="resetToLive()">LIVE</div>
        </div>

        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.heic">

        <div class="telemetry-grid">
            <div>CORES: <span id="cores">0</span></div>
            <div>LATENCY: <span id="fps">0</span>ms</div>
            <div>SOURCE: <span id="source-type">LIVE_STREAM</span></div>
            <div>MODE: BURST_OCR</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const imgP = document.getElementById('img-preview');
        const c = document.getElementById('overlay');
        const ctx = c.getContext('2d');
        const q = document.getElementById('q');
        const s = document.getElementById('status');
        const alertBox = document.getElementById('alert');
        const fileInput = document.getElementById('file-input');
        
        let scheduler, track, activeSource = 'video';
        let zoomLevel = 1, isBusy = false, lastScan = Date.now();

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                v.srcObject = stream;
                track = stream.getVideoTracks()[0];
            } catch(e) { s.innerText = "CAMERA_ACCESS_DENIED"; }

            scheduler = Tesseract.createScheduler();
            const workerCount = navigator.hardwareConcurrency || 4;
            document.getElementById('cores').innerText = workerCount;

            for(let i=0; i<workerCount; i++) {
                const w = await Tesseract.createWorker('eng');
                scheduler.addWorker(w);
            }

            s.innerText = "SYSTEMS_ONLINE";
            animateScanner();
            loop();
        }

        async function toggleTorch() {
            if(track && track.getCapabilities().torch) {
                const current = track.getSettings().torch;
                await track.applyConstraints({ advanced: [{ torch: !current }] });
            }
        }

        async function adjustZoom(val) {
            if(track && track.getCapabilities().zoom) {
                zoomLevel = Math.max(1, Math.min(track.getCapabilities().zoom.max, zoomLevel + val));
                await track.applyConstraints({ advanced: [{ zoom: zoomLevel }] });
            }
        }

        function animateScanner() {
            const bar = document.getElementById('scanner-bar');
            let pos = 0;
            setInterval(() => {
                pos = (pos + 1.5) % 100;
                bar.style.top = pos + '%';
            }, 16);
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            s.innerText = "DECRYPTING_FILE...";
            let source = file;

            if (file.name.toLowerCase().endsWith('.heic')) {
                s.innerText = "HEIC_CONVERSION...";
                const blob = await heic2any({ blob: file, toType: "image/jpeg" });
                source = blob;
            }

            const url = URL.createObjectURL(source);
            imgP.src = url;
            imgP.style.display = 'block';
            v.style.display = 'none';
            activeSource = 'image';
            document.getElementById('source-type').innerText = "STATIC_ARCHIVE";
            s.innerText = "ARCHIVE_LOADED";
        });

        function resetToLive() {
            imgP.style.display = 'none';
            v.style.display = 'block';
            activeSource = 'video';
            document.getElementById('source-type').innerText = "LIVE_STREAM";
            s.innerText = "STREAM_RESTORED";
        }

        async function loop() {
            if(!isBusy && q.value.length > 1) {
                isBusy = true;
                const now = Date.now();
                document.getElementById('fps').innerText = now - lastScan;
                lastScan = now;

                const input = activeSource === 'video' ? v : imgP;
                try {
                    const { data } = await scheduler.addJob('recognize', input);
                    handleResults(data.words);
                } catch(e) {}
                isBusy = false;
            } else if (q.value.length <= 1) {
                ctx.clearRect(0, 0, c.width, c.height);
                alertBox.style.display = 'none';
            }
            requestAnimationFrame(loop);
        }

        function handleResults(words) {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            ctx.clearRect(0, 0, c.width, c.height);

            const target = q.value.toLowerCase();
            let found = false;

            let scaleX, scaleY, offX = 0, offY = 0;

            if(activeSource === 'video') {
                scaleX = c.width / v.videoWidth;
                scaleY = c.height / v.videoHeight;
            } else {
                const imgScale = Math.min(c.width / imgP.naturalWidth, c.height / imgP.naturalHeight);
                scaleX = scaleY = imgScale;
                offX = (c.width - imgP.naturalWidth * imgScale) / 2;
                offY = (c.height - imgP.naturalHeight * imgScale) / 2;
            }

            words.forEach(word => {
                if(word.text.toLowerCase().includes(target)) {
                    found = true;
                    const b = word.bbox;
                    const x = b.x0 * scaleX + offX;
                    const y = b.y0 * scaleY + offY;
                    const w = (b.x1 - b.x0) * scaleX;
                    const h = (b.y1 - b.y0) * scaleY;

                    ctx.strokeStyle = '#ff003c';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);
                    ctx.fillStyle = 'rgba(255, 0, 60, 0.2)';
                    ctx.fillRect(x, y, w, h);
                    
                    ctx.fillStyle = '#ff003c';
                    ctx.font = '10px Courier New';
                    ctx.fillText(`CONFIRM_${word.confidence.toFixed(0)}%`, x, y - 5);
                }
            });

            if(found) {
                alertBox.style.display = 'block';
                if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
            } else {
                alertBox.style.display = 'none';
            }
        }

        init().catch(e => s.innerText = "FATAL_ERROR");
    </script>
</body>
</html>
